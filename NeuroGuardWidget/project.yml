name: NeuroGuard
options:
  bundleIdPrefix: com.neuroguard
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

targets:
  NeuroGuard:
    type: application
    platform: macOS
    sources:
      - path: NeuroGuard
        excludes: ["*.xcodeproj"]
    dependencies:
      - target: NeuroGuardWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neuroguard.app
        INFOPLIST_FILE: NeuroGuard/Info.plist
        CODE_SIGN_ENTITLEMENTS: NeuroGuard/NeuroGuard.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"

  NeuroGuardWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: NeuroGuardWidget
        excludes: ["*.xcodeproj"]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neuroguard.app.NeuroGuardWidget
        INFOPLIST_FILE: NeuroGuardWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: NeuroGuardWidget/NeuroGuardWidget.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_EMIT_LOC_STRINGS: YES
        SKIP_INSTALL: YES
